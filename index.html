<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ivan Caldarella">

    <!-- Font Google-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Edu+TAS+Beginner:wght@550&family=Sigmar&display=swap"
        rel="stylesheet">

    <!-- Boostrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Style -->
    <link rel="stylesheet" href="./style/index.css">

    <title>Estate '24 - Photo Blog</title>
</head>

<body>
    <div class="photo-overlay-box d-none" id="modale">
        <button class="close-btn"><i class="bi bi-x-circle"></i></button>
        <div class="photo-img-box">
            <img src="" alt="" class="overlay-img">
            <p class="mono" id="modal-desc"></p>
        </div>
    </div>
    <header class="header">
        <h1 class="head-title edu-tas">ESTATE '24</h1>
    </header>
    <main class="main">
        <!--Container per settare margine e flexbox-->
        <div class="main-container" id="main-container">
        </div>
        <div class="testform" id="testform">

            <div class="filebox">
                <div class="fb-flex">
                    <img>
                    <div class="fb-text">
                        <p class="fb-textcontent mono" id="fb-textcontent">
                            testo<br>testo
                        </p>
                    </div>
                </div>
            </div>

        </div>
        <div class="btn-box">
            <label for="loader" class="add-btn edu-tas">Aggiungi il tuo ricordo!</label>
            <input type="file" id="loader" name="loader" class="d-none" accept=".jpg, .jpeg, .png,">
        </div>
    </main>
    <script src="./script.js"></script>
</body>

</html>
